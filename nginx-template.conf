# Nginx Reverse Proxy Template for Nightscout
# Copy this file and customize the placeholders for your setup

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name name.example.com;

    ssl_certificate     /etc/letsencrypt/live/aimer.wtf/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aimer.wtf/privkey.pem;

    include /etc/nginx/security/common-exploits.conf;

    location / {
        proxy_pass http://localhost:1337;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;
    }
}
