version: '3.8'

x-logging: &default-logging
  options:
    max-size: '10m'
    max-file: '5'
  driver: json-file

services:
  mongo:
    image: mongo:8.0
    container_name: nightscout-mongo
    restart: always
    volumes:
      - ${NS_MONGO_DATA_DIR:-./mongo-data}:/data/db:cached
    logging: *default-logging
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  nightscout:
    image: cgm-remote-monitor:local
    container_name: nightscout
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${NS_PORT:-1337}:1337"
    logging: *default-logging
    environment:
      # Server settings
      NODE_ENV: production
      TZ: ${NS_TZ:-Etc/UTC}
      PORT: 1337
      INSECURE_USE_HTTP: 'true'

      # Database
      MONGO_CONNECTION: ${MONGO_CONNECTION:-mongodb://mongo:27017/nightscout}

      # Security
      API_SECRET: ${API_SECRET}

      # Features
      ENABLE: ${NS_ENABLE:-careportal rawbg iob cob basal sage cage iage bage}
      AUTH_DEFAULT_ROLES: ${NS_AUTH_DEFAULT_ROLES:-denied}
      DISPLAY_UNITS: ${NS_DISPLAY_UNITS:-mg/dl}

      # Alarms
      BG_HIGH: ${NS_BG_HIGH:-260}
      BG_TARGET_TOP: ${NS_BG_TARGET_TOP:-180}
      BG_TARGET_BOTTOM: ${NS_BG_TARGET_BOTTOM:-80}
      BG_LOW: ${NS_BG_LOW:-55}
      ALARM_URGENT_HIGH: ${NS_ALARM_URGENT_HIGH:-on}
      ALARM_HIGH: ${NS_ALARM_HIGH:-on}
      ALARM_LOW: ${NS_ALARM_LOW:-on}
      ALARM_URGENT_LOW: ${NS_ALARM_URGENT_LOW:-on}

      # Time format
      TIME_FORMAT: ${NS_TIME_FORMAT:-24}
      LANGUAGE: ${NS_LANGUAGE:-en}

      # Optional: Custom title
      CUSTOM_TITLE: ${NS_CUSTOM_TITLE:-Nightscout}
